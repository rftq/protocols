<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PAID Research — Умный JSON конструктор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Segoe UI Variable', 'Roboto', sans-serif;
        }

        body {
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* две колонки: левая уже, правая шире */
        .app-dashboard {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 0.85fr 1.4fr;
            gap: 24px;
        }

        .card-pane {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid #eaeef2;
            padding: 24px 22px;
            transition: box-shadow 0.1s ease;
        }

        .card-pane:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        /* строка заголовка с кнопкой слева */
        .title-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 1.5rem;
        }
        .title-row h2 {
            font-size: 1.45rem;
            font-weight: 500;
            margin: 0;
            border-left: 3px solid #0078d4;
            padding-left: 14px;
            letter-spacing: -0.2px;
        }
        .load-json-btn {
            background: #f0f2f5;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .load-json-btn:hover {
            background: #e6e9ef;
            border-color: #0078d4;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c2e33;
            margin-bottom: 6px;
            letter-spacing: -0.1px;
        }

        input, select, button {
            border-radius: 10px;
            border: 1px solid #d1d9e6;
            background: #ffffff;
            padding: 8px 12px;
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.15s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
        }

        .date-small {
            max-width: 260px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            background: #f9fafc;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e9edf2;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
            cursor: pointer;
            margin: 0;
            font-size: 0.9rem;
        }

        .radio-group input {
            width: auto;
            accent-color: #0078d4;
        }

        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .flex-row select {
            flex: 1;
        }

        button {
            background: #ffffff;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #cbd5e1;
            transition: 0.1s linear;
        }

        button:active {
            transform: scale(0.97);
        }

        button.primary-btn {
            background: #0078d4;
            border-color: #0078d4;
            color: white;
        }

        button.primary-btn:hover {
            background: #106ebe;
        }

        .add-to-json-btn {
            margin-top: 18px;
            width: 100%;
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
        }

        .add-to-json-btn:hover {
            background: #106ebe;
        }

        /* блок сокращений */
        .abbrev-section {
            margin-top: 20px;
            border-top: 1px solid #eef2f6;
            padding-top: 16px;
        }
        .abbrev-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .abbrev-list {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 12px;
            background: #fafcff;
            border-radius: 14px;
            padding: 4px;
        }
        .abbrev-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 30px;
            border: 1px solid #eef2f6;
            font-size: 0.8rem;
        }
        .abbrev-pair {
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 40px;
        }
        .abbrev-actions button {
            width: auto;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 6px;
            background: white;
        }
        .add-abbrev {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .add-abbrev input {
            flex: 1;
            min-width: 100px;
            padding: 6px 10px;
            font-size: 0.8rem;
        }
        .add-abbrev button {
            width: auto;
            padding: 6px 14px;
            background: #f0f2f5;
        }

        /* импортная зона (правый блок) */
        .import-area {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .file-button-wrapper {
            position: relative;
            display: inline-flex;
        }
        .custom-file-btn {
            background: #f0f2f5;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: #1e1f22;
            white-space: nowrap;
        }
        .custom-file-btn:hover {
            background: #e6e9ef;
            border-color: #0078d4;
        }
        #jsonImportFile {
            display: none;
        }
        .file-name {
            font-size: 0.8rem;
            color: #4a5568;
            background: #f8f9fc;
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* JSON viewer карточки */
        .json-viewer {
            max-height: 65vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-right: 4px;
        }
        .data-card {
            background: #fefefe;
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid #eef2f6;
            transition: 0.08s linear;
        }
        .data-card:hover {
            border-color: #cddfed;
        }
        .card-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .card-icon {
            font-size: 1.2rem;
            min-width: 30px;
        }
        .card-label {
            font-weight: 600;
            color: #2d3748;
            min-width: 100px;
        }
        .card-value {
            color: #1a202c;
            background: #f7fafc;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .placeholder {
            text-align: center;
            color: #7f8c8d;
            padding: 32px 16px;
            background: #fafcff;
            border-radius: 24px;
            font-size: 0.85rem;
        }

        /* модальное окно исполнителей (минималистично) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            padding: 24px;
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid #eef2f8;
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .executor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            margin-bottom: 10px;
            padding: 8px 14px;
            border-radius: 40px;
        }
        .executor-actions button {
            width: auto;
            padding: 4px 12px;
            margin-left: 8px;
            font-size: 0.7rem;
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .app-dashboard { grid-template-columns: 1fr; gap: 20px; }
            .date-small { max-width: 100%; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #eef2f8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-dashboard">
    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <div class="card-pane">
        <div class="title-row">
            <button class="load-json-btn" id="loadJsonBtnLeft">📂 Загрузить JSON</button>
            <h2>📋 Новая заявка</h2>
        </div>

        <div class="form-group">
            <label>📅 Дата (ДД.ММ.ГГГГ ЧЧ-ММ)</label>
            <input type="datetime-local" id="dateTimeField" class="date-small">
        </div>
        <div class="form-group">
            <label>👤 ФИО</label>
            <input type="text" id="fullNameField" placeholder="Иванов Иван Иванович">
        </div>
        <div class="form-group">
            <label>📡 Модальность</label>
            <div class="radio-group" id="modalityGroup">
                <label><input type="radio" name="modality" value="РГ" checked> 📦 РГ</label>
                <label><input type="radio" name="modality" value="ФЛГ"> 🫁 ФЛГ</label>
                <label><input type="radio" name="modality" value="КТ"> 🖥️ КТ</label>
                <label><input type="radio" name="modality" value="МРТ"> 🧠 МРТ</label>
            </div>
        </div>
        <div class="form-group">
            <label>📝 Название исследования (автозамена из списка)</label>
            <input type="text" id="studyNameField" placeholder="Например: кт грудной клетки">
        </div>
        <div class="form-group">
            <label>👨‍💻 Исполнитель</label>
            <div class="flex-row">
                <select id="executorSelect"></select>
                <button type="button" id="editExecutorsBtn" style="width: auto;">✏️ Правка</button>
            </div>
        </div>

        <!-- Блок управления сокращениями -->
        <div class="abbrev-section">
            <div class="abbrev-title">
                <span>🔤 Сокращения → полная фраза</span>
            </div>
            <div id="abbrevListContainer" class="abbrev-list"></div>
            <div class="add-abbrev">
                <input type="text" id="newAbbr" placeholder="сокращение (кт)">
                <input type="text" id="newFull" placeholder="полная фраза">
                <button id="addAbbrevBtn">➕ Добавить</button>
            </div>
            <div style="font-size: 0.7rem; color:#6c757d; margin-top: 8px;">Автозамена работает в реальном времени</div>
        </div>

        <button id="addToJsonBtn" class="add-to-json-btn">➕ Добавить в JSON</button>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: JSON Viewer с автозагрузкой -->
    <div class="card-pane">
        <h2>🔍 JSON Viewer</h2>
        <div class="import-area">
            <div class="file-button-wrapper">
                <button class="custom-file-btn" id="customFileBtnRight">📁 Выбрать файл</button>
                <input type="file" id="jsonImportFile" accept=".json">
            </div>
            <span id="fileNameDisplay" class="file-name">Файл не выбран</span>
        </div>
        <div id="jsonViewerContainer" class="json-viewer">
            <div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО для исполнителей -->
<div id="executorModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <h3>📇 Редактор исполнителей</h3>
        <div id="executorListModal"></div>
        <div class="add-executor">
            <input type="text" id="newExecutorInput" placeholder="ФИО исполнителя">
            <button id="addExecutorModalBtn">➕ Добавить</button>
        </div>
        <div class="modal-buttons">
            <button id="saveExecutorsModalBtn" class="primary-btn">💾 Сохранить</button>
            <button id="cancelModalSaveBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ---------- ГЛОБАЛЬНЫЕ ДАННЫЕ ----------
    let executorsList = [];               // исполнители
    let abbreviations = [];              // [{abbr, full}]
    let currentLoadedJson = null;        // загруженный JSON (объект или массив)
    let selectedFile = null;              // для отображения имени файла

    const STORAGE_EXECUTORS = 'paid_executors';
    const STORAGE_ABBREV = 'paid_abbreviations';

    // стандартные сокращения
    const DEFAULT_ABBREV = [
        { abbr: "рг", full: "Рентгенография" },
        { abbr: "флг", full: "Флюорография" },
        { abbr: "кт", full: "Компьютерная томография" },
        { abbr: "мрт", full: "Магнитно-резонансная томография" }
    ];

    // ---------- ЗАГРУЗКА / СОХРАНЕНИЕ ----------
    function loadExecutors() {
        const stored = localStorage.getItem(STORAGE_EXECUTORS);
        if (stored) {
            try {
                executorsList = JSON.parse(stored);
                if (!Array.isArray(executorsList) || executorsList.length === 0) throw new Error();
            } catch(e) {
                executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
            }
        } else {
            executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
        }
        renderExecutorSelect();
    }

    function saveExecutorsToLocal() {
        localStorage.setItem(STORAGE_EXECUTORS, JSON.stringify(executorsList));
    }

    function loadAbbreviations() {
        const stored = localStorage.getItem(STORAGE_ABBREV);
        if (stored) {
            try {
                abbreviations = JSON.parse(stored);
                if (!Array.isArray(abbreviations)) throw new Error();
            } catch(e) {
                abbreviations = [...DEFAULT_ABBREV];
            }
        } else {
            abbreviations = [...DEFAULT_ABBREV];
        }
        renderAbbrevList();
    }

    function saveAbbreviationsToLocal() {
        localStorage.setItem(STORAGE_ABBREV, JSON.stringify(abbreviations));
    }

    // отрисовка списка сокращений
    function renderAbbrevList() {
        const container = document.getElementById('abbrevListContainer');
        if (!container) return;
        container.innerHTML = '';
        if (abbreviations.length === 0) {
            container.innerHTML = '<div style="padding: 12px; text-align:center; color:#aaa;">Нет сокращений</div>';
            return;
        }
        abbreviations.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'abbrev-item';
            div.innerHTML = `
                <div><span class="abbrev-pair">${escapeHtml(item.abbr)} → ${escapeHtml(item.full)}</span></div>
                <div class="abbrev-actions">
                    <button class="edit-abbrev" data-idx="${idx}">✏️</button>
                    <button class="del-abbrev" data-idx="${idx}">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });

        // обработчики редактирования и удаления
        document.querySelectorAll('.edit-abbrev').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                const newAbbr = prompt('Сокращение (например, кт):', abbreviations[idx].abbr);
                if (newAbbr && newAbbr.trim()) {
                    const newFull = prompt('Полная фраза:', abbreviations[idx].full);
                    if (newFull && newFull.trim()) {
                        abbreviations[idx] = { abbr: newAbbr.trim().toLowerCase(), full: newFull.trim() };
                        saveAbbreviationsToLocal();
                        renderAbbrevList();
                        // обновить автозамену в поле (если нужно)
                        triggerAutoReplaceOnStudyField();
                    }
                }
            });
        });
        document.querySelectorAll('.del-abbrev').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                abbreviations.splice(idx, 1);
                saveAbbreviationsToLocal();
                renderAbbrevList();
                triggerAutoReplaceOnStudyField();
            });
        });
    }

    // принудительная автозамена в поле исследования
    function triggerAutoReplaceOnStudyField() {
        const studyInput = document.getElementById('studyNameField');
        if (studyInput && studyInput.value.trim() !== '') {
            autoReplaceAbbreviations(studyInput);
        }
    }

    // автозамена с текущим списком сокращений
    function autoReplaceAbbreviations(inputElement) {
        let value = inputElement.value;
        let changed = false;
        for (let rule of abbreviations) {
            const abbr = rule.abbr;
            const full = rule.full;
            const regex = new RegExp(`\\b${escapeRegex(abbr)}\\b`, 'gi');
            const newValue = value.replace(regex, full);
            if (newValue !== value) {
                value = newValue;
                changed = true;
            }
        }
        if (changed) {
            const cursorPos = inputElement.selectionStart;
            inputElement.value = value;
            if (cursorPos) inputElement.setSelectionRange(cursorPos, cursorPos);
        }
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function renderExecutorSelect() {
        const selectEl = document.getElementById('executorSelect');
        if (!selectEl) return;
        selectEl.innerHTML = '';
        if (executorsList.length === 0) {
            const option = document.createElement('option');
            option.textContent = 'Нет исполнителей, добавьте в списке';
            option.disabled = true;
            selectEl.appendChild(option);
        } else {
            executorsList.forEach(exec => {
                const option = document.createElement('option');
                option.value = exec;
                option.textContent = exec;
                selectEl.appendChild(option);
            });
        }
    }

    function setDefaultDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('dateTimeField').value = `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    // Получение данных из формы
    function getFormData() {
        const dateRaw = document.getElementById('dateTimeField').value;
        if (!dateRaw) throw new Error('Укажите дату');
        const fullName = document.getElementById('fullNameField').value.trim();
        if (!fullName) throw new Error('Введите ФИО');
        let modality = '';
        const radios = document.getElementsByName('modality');
        for (let r of radios) if (r.checked) { modality = r.value; break; }
        const studyNameRaw = document.getElementById('studyNameField').value.trim();
        const executor = document.getElementById('executorSelect').value;
        const studyName = studyNameRaw || 'Не указано';
        return { dateRaw, fullName, modality, studyName, executor };
    }

    // Формирование имени файла по правилу PAID_rg_23mar_23-13-18.json
    function generateFileName(modality, dateTimeStr) {
        const prefixMap = { 'РГ':'rg', 'ФЛГ':'flg', 'КТ':'ct', 'МРТ':'mrt' };
        const prefix = prefixMap[modality] || 'rg';
        let dateObj = new Date(dateTimeStr);
        if (isNaN(dateObj.getTime())) dateObj = new Date();
        const day = dateObj.getDate();
        const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
        const monthAbbr = months[dateObj.getMonth()];
        const hours = String(dateObj.getHours()).padStart(2,'0');
        const minutes = String(dateObj.getMinutes()).padStart(2,'0');
        const seconds = String(new Date().getSeconds()).padStart(2,'0');
        return `PAID_${prefix}_${day}${monthAbbr}_${hours}-${minutes}-${seconds}.json`;
    }

    // Добавить в JSON (основная логика)
    function addToJson() {
        try {
            const formData = getFormData();
            const newRecord = {
                dateTime: formData.dateRaw,
                fullName: formData.fullName,
                modality: formData.modality,
                studyName: formData.studyName,
                executor: formData.executor,
                addedTimestamp: new Date().toISOString()
            };

            let baseData = null;
            if (currentLoadedJson !== null) {
                baseData = currentLoadedJson;
            }

            let updatedData;
            if (baseData === null) {
                updatedData = [newRecord];
            } else if (Array.isArray(baseData)) {
                updatedData = [...baseData, newRecord];
            } else if (typeof baseData === 'object') {
                updatedData = [baseData, newRecord];
            } else {
                updatedData = [newRecord];
            }

            const fileName = generateFileName(formData.modality, formData.dateRaw);
            const jsonStr = JSON.stringify(updatedData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } catch (err) {
            alert(err.message);
        }
    }

    // ---------- ЗАГРУЗКА JSON (общая логика) ----------
    function loadAndDisplayJson(file) {
        if (!file) return;
        selectedFile = file;
        updateFileNameDisplay(file);
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                currentLoadedJson = parsed;
                renderJsonCards(parsed);
            } catch (err) {
                alert('Ошибка парсинга JSON: ' + err.message);
                document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">❌ Неверный формат JSON</div>';
                currentLoadedJson = null;
            }
        };
        reader.onerror = () => alert('Не удалось прочитать файл');
        reader.readAsText(file, 'UTF-8');
    }

    function renderJsonCards(data) {
        const container = document.getElementById('jsonViewerContainer');
        container.innerHTML = '';
        let items = [];
        if (Array.isArray(data)) items = data;
        else if (data && typeof data === 'object') items = [data];
        else {
            container.innerHTML = '<div class="placeholder">⚠️ Некорректный JSON: ожидается объект или массив</div>';
            return;
        }
        if (items.length === 0) {
            container.innerHTML = '<div class="placeholder">📭 JSON не содержит данных</div>';
            return;
        }
        for (let record of items) {
            const card = document.createElement('div');
            card.className = 'data-card';
            const getVal = (key, def = '—') => (record[key] !== undefined && record[key] !== '') ? record[key] : def;
            let displayDate = getVal('dateTime');
            if (displayDate !== '—' && displayDate.includes('T')) {
                try {
                    const [datePart, timePart] = displayDate.split('T');
                    const [year, month, day] = datePart.split('-');
                    displayDate = `${day}.${month}.${year} ${timePart}`;
                } catch(e) {}
            }
            let modalityVal = getVal('modality');
            let modalityEmoji = '';
            if (modalityVal.includes('РГ')) modalityEmoji = '📦';
            else if (modalityVal.includes('ФЛГ')) modalityEmoji = '🫁';
            else if (modalityVal.includes('КТ')) modalityEmoji = '🖥️';
            else if (modalityVal.includes('МРТ')) modalityEmoji = '🧠';
            else modalityEmoji = '📡';
            card.innerHTML = `
                <div class="card-row"><span class="card-icon">📅</span><span class="card-label">Дата:</span><span class="card-value">${escapeHtml(displayDate)}</span></div>
                <div class="card-row"><span class="card-icon">👤</span><span class="card-label">ФИО:</span><span class="card-value">${escapeHtml(getVal('fullName'))}</span></div>
                <div class="card-row"><span class="card-icon">${modalityEmoji}</span><span class="card-label">Модальность:</span><span class="card-value">${escapeHtml(modalityVal)}</span></div>
                <div class="card-row"><span class="card-icon">📝</span><span class="card-label">Исследование:</span><span class="card-value">${escapeHtml(getVal('studyName'))}</span></div>
                <div class="card-row"><span class="card-icon">👨‍💻</span><span class="card-label">Исполнитель:</span><span class="card-value">${escapeHtml(getVal('executor'))}</span></div>
            `;
            container.appendChild(card);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateFileNameDisplay(file) {
        const span = document.getElementById('fileNameDisplay');
        if (file) span.textContent = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name;
        else span.textContent = 'Файл не выбран';
    }

    // ---------- МОДАЛЬНОЕ ОКНО ИСПОЛНИТЕЛЕЙ ----------
    let tempExecutors = [];
    function openExecutorModal() {
        tempExecutors = [...executorsList];
        renderModalExecutorList();
        document.getElementById('executorModal').style.display = 'flex';
    }
    function renderModalExecutorList() {
        const container = document.getElementById('executorListModal');
        if (!container) return;
        container.innerHTML = '';
        if (tempExecutors.length === 0) {
            container.innerHTML = '<div class="executor-item"><span>Нет исполнителей, добавьте нового</span></div>';
        } else {
            tempExecutors.forEach((exec, idx) => {
                const div = document.createElement('div');
                div.className = 'executor-item';
                div.innerHTML = `<span class="executor-name">${escapeHtml(exec)}</span>
                    <div><button class="edit-exec-modal" data-idx="${idx}">✏️</button>
                    <button class="del-exec-modal" data-idx="${idx}">🗑️</button></div>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.edit-exec-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    const newName = prompt('Новое ФИО:', tempExecutors[idx]);
                    if (newName && newName.trim()) { tempExecutors[idx] = newName.trim(); renderModalExecutorList(); }
                });
            });
            document.querySelectorAll('.del-exec-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    tempExecutors.splice(idx, 1);
                    renderModalExecutorList();
                });
            });
        }
    }
    function closeModal() { document.getElementById('executorModal').style.display = 'none'; }
    function saveExecutorsFromModal() {
        if (tempExecutors.length === 0) {
            if (confirm('Список исполнителей пуст. Продолжить?')) { executorsList = []; saveExecutorsToLocal(); renderExecutorSelect(); closeModal(); }
        } else { executorsList = [...tempExecutors]; saveExecutorsToLocal(); renderExecutorSelect(); closeModal(); }
    }

    // ---------- СОБЫТИЯ ----------
    function setupEventListeners() {
        // Автозамена в поле исследования
        const studyInput = document.getElementById('studyNameField');
        if (studyInput) studyInput.addEventListener('input', () => autoReplaceAbbreviations(studyInput));

        // Добавить в JSON
        document.getElementById('addToJsonBtn').addEventListener('click', addToJson);

        // Редактор исполнителей
        document.getElementById('editExecutorsBtn').addEventListener('click', openExecutorModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelModalSaveBtn').addEventListener('click', closeModal);
        document.getElementById('saveExecutorsModalBtn').addEventListener('click', saveExecutorsFromModal);
        document.getElementById('addExecutorModalBtn').addEventListener('click', () => {
            const name = document.getElementById('newExecutorInput').value.trim();
            if (name) { tempExecutors.push(name); document.getElementById('newExecutorInput').value = ''; renderModalExecutorList(); }
            else alert('Введите ФИО');
        });

        // Загрузка JSON (правый блок + левая кнопка)
        const fileInput = document.getElementById('jsonImportFile');
        const customBtnRight = document.getElementById('customFileBtnRight');
        const loadJsonLeft = document.getElementById('loadJsonBtnLeft');

        customBtnRight.addEventListener('click', () => fileInput.click());
        loadJsonLeft.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                loadAndDisplayJson(e.target.files[0]);
            } else {
                selectedFile = null;
                currentLoadedJson = null;
                updateFileNameDisplay(null);
                document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>';
            }
        });

        // Добавление сокращения
        document.getElementById('addAbbrevBtn').addEventListener('click', () => {
            const abbr = document.getElementById('newAbbr').value.trim().toLowerCase();
            const full = document.getElementById('newFull').value.trim();
            if (!abbr || !full) { alert('Введите и сокращение, и полную фразу'); return; }
            if (abbreviations.some(a => a.abbr === abbr)) { alert('Такое сокращение уже есть'); return; }
            abbreviations.push({ abbr, full });
            saveAbbreviationsToLocal();
            renderAbbrevList();
            document.getElementById('newAbbr').value = '';
            document.getElementById('newFull').value = '';
            triggerAutoReplaceOnStudyField();
        });

        // Закрытие модалки по клику вне
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('executorModal');
            if (e.target === modal) closeModal();
        });
    }

    function init() {
        loadExecutors();
        loadAbbreviations();
        setDefaultDateTime();
        setupEventListeners();
        currentLoadedJson = null;
        selectedFile = null;
        updateFileNameDisplay(null);
        document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>';
    }
    init();
</script>
</body>
</html>
