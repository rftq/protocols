<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PAID Research — Minimal Windows 11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Segoe UI Variable', 'Roboto', sans-serif;
        }

        body {
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* две колонки с изменённой шириной: левая уже, правая шире */
        .app-dashboard {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 0.85fr 1.4fr;
            gap: 24px;
        }

        /* карточки — минималистичный Windows 11, без излишней прозрачности */
        .card-pane {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid #eaeef2;
            padding: 24px 22px;
            transition: box-shadow 0.1s ease;
        }

        .card-pane:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.45rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #1e1f22;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #0078d4;
            padding-left: 14px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c2e33;
            margin-bottom: 6px;
            letter-spacing: -0.1px;
        }

        input, select, button {
            border-radius: 10px;
            border: 1px solid #d1d9e6;
            background: #ffffff;
            padding: 8px 12px;
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.15s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
        }

        /* уменьшенное поле даты */
        .date-small {
            max-width: 260px;
        }

        /* радио-группа с эмодзи */
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            background: #f9fafc;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e9edf2;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
            cursor: pointer;
            margin: 0;
            font-size: 0.9rem;
        }

        .radio-group input {
            width: auto;
            margin-right: 0;
            accent-color: #0078d4;
        }

        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .flex-row select {
            flex: 1;
        }

        button {
            background: #ffffff;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #cbd5e1;
            transition: 0.1s linear;
        }

        button:active {
            transform: scale(0.97);
        }

        button.primary-btn {
            background: #0078d4;
            border-color: #0078d4;
            color: white;
        }

        button.primary-btn:hover {
            background: #106ebe;
        }

        .export-btn {
            margin-top: 18px;
            width: 100%;
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
        }

        .export-btn:hover {
            background: #106ebe;
        }

        /* импортная зона стильная */
        .import-area {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .file-button-wrapper {
            position: relative;
            display: inline-flex;
        }

        .custom-file-btn {
            background: #f0f2f5;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: #1e1f22;
            white-space: nowrap;
        }

        .custom-file-btn:hover {
            background: #e6e9ef;
            border-color: #0078d4;
        }

        #jsonImportFile {
            display: none;
        }

        .file-name {
            font-size: 0.8rem;
            color: #4a5568;
            background: #f8f9fc;
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .import-action-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px 18px;
            font-weight: 500;
        }

        .import-action-btn:hover {
            background: #f1f5f9;
            border-color: #0078d4;
        }

        /* JSON viewer карточки */
        .json-viewer {
            max-height: 65vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-right: 4px;
        }

        .data-card {
            background: #fefefe;
            border-radius: 18px;
            padding: 16px 18px;
            border: 1px solid #eef2f6;
            transition: 0.08s linear;
        }

        .data-card:hover {
            border-color: #cddfed;
            background: #ffffff;
        }

        .card-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .card-icon {
            font-size: 1.2rem;
            min-width: 30px;
        }

        .card-label {
            font-weight: 600;
            color: #2d3748;
            min-width: 100px;
        }

        .card-value {
            color: #1a202c;
            background: #f7fafc;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .placeholder {
            text-align: center;
            color: #7f8c8d;
            padding: 32px 16px;
            background: #fafcff;
            border-radius: 24px;
            font-size: 0.85rem;
        }

        /* модальное окно минималистичное */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            padding: 24px;
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid #eef2f8;
            animation: fadeSlide 0.2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h3 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .executor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            margin-bottom: 10px;
            padding: 8px 14px;
            border-radius: 40px;
        }

        .executor-name {
            font-weight: 500;
        }

        .executor-actions button {
            width: auto;
            padding: 4px 12px;
            margin-left: 8px;
            font-size: 0.7rem;
            background: white;
        }

        .add-executor {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }

        .close {
            float: right;
            font-size: 26px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
        }

        .close:hover {
            color: #0078d4;
        }

        @media (max-width: 780px) {
            body {
                padding: 1rem;
            }
            .app-dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .date-small {
                max-width: 100%;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="app-dashboard">
    <!-- ЛЕВАЯ ПАНЕЛЬ: уже -->
    <div class="card-pane">
        <h2>📋 Новая заявка</h2>
        <div class="form-group">
            <label>📅 Дата (ДД.ММ.ГГГГ ЧЧ-ММ)</label>
            <input type="datetime-local" id="dateTimeField" class="date-small">
        </div>
        <div class="form-group">
            <label>👤 ФИО</label>
            <input type="text" id="fullNameField" placeholder="Иванов Иван Иванович">
        </div>
        <div class="form-group">
            <label>📡 Модальность</label>
            <div class="radio-group" id="modalityGroup">
                <label><input type="radio" name="modality" value="РГ" checked> 📦 РГ</label>
                <label><input type="radio" name="modality" value="ФЛГ"> 🫁 ФЛГ</label>
                <label><input type="radio" name="modality" value="КТ"> 🖥️ КТ</label>
                <label><input type="radio" name="modality" value="МРТ"> 🧠 МРТ</label>
            </div>
        </div>
        <div class="form-group">
            <label>📝 Название исследования (автозамена: кт → Компьютерная томография и т.д.)</label>
            <input type="text" id="studyNameField" placeholder="Например: кт грудной клетки">
        </div>
        <div class="form-group">
            <label>👨‍💻 Исполнитель</label>
            <div class="flex-row">
                <select id="executorSelect"></select>
                <button type="button" id="editExecutorsBtn" style="width: auto; white-space: nowrap;">✏️ Правка</button>
            </div>
        </div>
        <button id="exportBtn" class="export-btn">📎 Экспорт в JSON</button>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: JSON Viewer расширенный -->
    <div class="card-pane">
        <h2>🔍 JSON Viewer</h2>
        <div class="import-area">
            <div class="file-button-wrapper">
                <button class="custom-file-btn" id="customFileBtn">📁 Выбрать файл</button>
                <input type="file" id="jsonImportFile" accept=".json">
            </div>
            <span id="fileNameDisplay" class="file-name">Файл не выбран</span>
            <button id="importJsonBtn" class="import-action-btn">📂 Импортировать</button>
        </div>
        <div id="jsonViewerContainer" class="json-viewer">
            <div class="placeholder">✨ Импортируйте JSON-файл, чтобы увидеть карточки с данными</div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО для исполнителей -->
<div id="executorModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <h3>📇 Редактор исполнителей</h3>
        <div id="executorListModal"></div>
        <div class="add-executor">
            <input type="text" id="newExecutorInput" placeholder="ФИО исполнителя">
            <button id="addExecutorModalBtn">➕ Добавить</button>
        </div>
        <div class="modal-buttons">
            <button id="saveExecutorsModalBtn" class="primary-btn">💾 Сохранить</button>
            <button id="cancelModalSaveBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ---------- ДАННЫЕ ----------
    let executorsList = [];
    const STORAGE_KEY = 'paid_executors';
    let selectedFile = null;   // для отображения имени

    const abbreviationMap = {
        'рг': 'Рентгенография',
        'флг': 'Флюорография',
        'кт': 'Компьютерная томография',
        'мрт': 'Магнитно-резонансная томография'
    };

    const modalityPrefix = {
        'РГ': 'rg',
        'ФЛГ': 'flg',
        'КТ': 'ct',
        'МРТ': 'mrt'
    };

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function loadExecutors() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                executorsList = JSON.parse(stored);
                if (!Array.isArray(executorsList) || executorsList.length === 0) throw new Error();
            } catch(e) {
                executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
            }
        } else {
            executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
        }
        renderExecutorSelect();
    }

    function saveExecutorsToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(executorsList));
    }

    function renderExecutorSelect() {
        const selectEl = document.getElementById('executorSelect');
        if (!selectEl) return;
        selectEl.innerHTML = '';
        if (executorsList.length === 0) {
            const option = document.createElement('option');
            option.textContent = 'Нет исполнителей, добавьте в списке';
            option.disabled = true;
            selectEl.appendChild(option);
        } else {
            executorsList.forEach(exec => {
                const option = document.createElement('option');
                option.value = exec;
                option.textContent = exec;
                selectEl.appendChild(option);
            });
        }
    }

    function setDefaultDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const defaultValue = `${year}-${month}-${day}T${hours}:${minutes}`;
        const dateInput = document.getElementById('dateTimeField');
        if (dateInput) dateInput.value = defaultValue;
    }

    // Автозамена сокращений
    function autoReplaceAbbreviations(inputElement) {
        let value = inputElement.value;
        let changed = false;
        for (const [abbr, full] of Object.entries(abbreviationMap)) {
            const regex = new RegExp(`\\b${abbr}\\b`, 'gi');
            const newValue = value.replace(regex, full);
            if (newValue !== value) {
                value = newValue;
                changed = true;
            }
        }
        if (changed) {
            const cursorPos = inputElement.selectionStart;
            inputElement.value = value;
            if (cursorPos) inputElement.setSelectionRange(cursorPos, cursorPos);
        }
    }

    // ЭКСПОРТ
    function exportToJson() {
        const dateRaw = document.getElementById('dateTimeField').value;
        if (!dateRaw) {
            alert('Укажите дату и время');
            return;
        }
        const fullName = document.getElementById('fullNameField').value.trim();
        if (!fullName) {
            alert('Введите ФИО');
            return;
        }
        let modality = '';
        const radios = document.getElementsByName('modality');
        for (let radio of radios) {
            if (radio.checked) {
                modality = radio.value;
                break;
            }
        }
        const studyNameRaw = document.getElementById('studyNameField').value.trim();
        const executor = document.getElementById('executorSelect').value;
        const studyName = studyNameRaw || 'Не указано';

        const exportData = {
            dateTime: dateRaw,
            fullName: fullName,
            modality: modality,
            studyName: studyName,
            executor: executor,
            exportTimestamp: new Date().toISOString()
        };

        const prefix = modalityPrefix[modality] || 'rg';
        let dateObj = new Date(dateRaw);
        if (isNaN(dateObj.getTime())) dateObj = new Date();
        const day = dateObj.getDate();
        const monthNames = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
        const monthAbbr = monthNames[dateObj.getMonth()];
        const hours = String(dateObj.getHours()).padStart(2, '0');
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        const seconds = String(new Date().getSeconds()).padStart(2, '0');
        const dateTimeForFile = `${day}${monthAbbr}_${hours}-${minutes}-${seconds}`;
        const fileName = `PAID_${prefix}_${dateTimeForFile}.json`;

        const jsonStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // ---------- ИМПОРТ И ОТОБРАЖЕНИЕ КАРТОЧЕК ----------
    function renderJsonCards(data) {
        const container = document.getElementById('jsonViewerContainer');
        container.innerHTML = '';
        let items = [];
        if (Array.isArray(data)) items = data;
        else if (data && typeof data === 'object') items = [data];
        else {
            container.innerHTML = '<div class="placeholder">⚠️ Некорректный JSON: ожидается объект или массив</div>';
            return;
        }

        if (items.length === 0) {
            container.innerHTML = '<div class="placeholder">📭 JSON не содержит данных</div>';
            return;
        }

        for (let record of items) {
            const card = document.createElement('div');
            card.className = 'data-card';

            const getVal = (key, def = '—') => (record[key] !== undefined && record[key] !== '') ? record[key] : def;

            let displayDate = getVal('dateTime');
            if (displayDate !== '—' && displayDate.includes('T')) {
                try {
                    const [datePart, timePart] = displayDate.split('T');
                    const [year, month, day] = datePart.split('-');
                    displayDate = `${day}.${month}.${year} ${timePart}`;
                } catch(e) {}
            }

            let modalityVal = getVal('modality');
            let modalityEmoji = '';
            if (modalityVal.includes('РГ')) modalityEmoji = '📦';
            else if (modalityVal.includes('ФЛГ')) modalityEmoji = '🫁';
            else if (modalityVal.includes('КТ')) modalityEmoji = '🖥️';
            else if (modalityVal.includes('МРТ')) modalityEmoji = '🧠';
            else modalityEmoji = '📡';

            card.innerHTML = `
                <div class="card-row">
                    <span class="card-icon">📅</span>
                    <span class="card-label">Дата:</span>
                    <span class="card-value">${escapeHtml(displayDate)}</span>
                </div>
                <div class="card-row">
                    <span class="card-icon">👤</span>
                    <span class="card-label">ФИО:</span>
                    <span class="card-value">${escapeHtml(getVal('fullName'))}</span>
                </div>
                <div class="card-row">
                    <span class="card-icon">${modalityEmoji}</span>
                    <span class="card-label">Модальность:</span>
                    <span class="card-value">${escapeHtml(modalityVal)}</span>
                </div>
                <div class="card-row">
                    <span class="card-icon">📝</span>
                    <span class="card-label">Исследование:</span>
                    <span class="card-value">${escapeHtml(getVal('studyName'))}</span>
                </div>
                <div class="card-row">
                    <span class="card-icon">👨‍💻</span>
                    <span class="card-label">Исполнитель:</span>
                    <span class="card-value">${escapeHtml(getVal('executor'))}</span>
                </div>
            `;
            container.appendChild(card);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function importJsonFromFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const jsonData = JSON.parse(e.target.result);
                renderJsonCards(jsonData);
            } catch (err) {
                alert('Ошибка парсинга JSON: ' + err.message);
                document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">❌ Неверный формат JSON</div>';
            }
        };
        reader.onerror = () => alert('Не удалось прочитать файл');
        reader.readAsText(file, 'UTF-8');
    }

    // ---------- МОДАЛЬНОЕ ОКНО ----------
    let tempExecutors = [];

    function openExecutorModal() {
        tempExecutors = [...executorsList];
        renderModalExecutorList();
        document.getElementById('executorModal').style.display = 'flex';
    }

    function renderModalExecutorList() {
        const container = document.getElementById('executorListModal');
        if (!container) return;
        container.innerHTML = '';
        if (tempExecutors.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.className = 'executor-item';
            emptyMsg.innerHTML = '<span style="opacity:0.6;">Нет исполнителей, добавьте нового</span>';
            container.appendChild(emptyMsg);
        } else {
            tempExecutors.forEach((exec, idx) => {
                const div = document.createElement('div');
                div.className = 'executor-item';
                div.innerHTML = `
                    <span class="executor-name">${escapeHtml(exec)}</span>
                    <div class="executor-actions">
                        <button class="edit-exec-btn" data-index="${idx}">✏️ Ред.</button>
                        <button class="delete-exec-btn" data-index="${idx}">🗑️ Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.edit-exec-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    const newName = prompt('Введите новое ФИО исполнителя:', tempExecutors[idx]);
                    if (newName && newName.trim() !== '') {
                        tempExecutors[idx] = newName.trim();
                        renderModalExecutorList();
                    }
                });
            });
            document.querySelectorAll('.delete-exec-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    tempExecutors.splice(idx, 1);
                    renderModalExecutorList();
                });
            });
        }
    }

    function closeModal() {
        document.getElementById('executorModal').style.display = 'none';
    }

    function saveExecutorsFromModal() {
        if (tempExecutors.length === 0) {
            if (confirm('Список исполнителей пуст. Продолжить?')) {
                executorsList = [];
                saveExecutorsToLocal();
                renderExecutorSelect();
                closeModal();
            }
        } else {
            executorsList = [...tempExecutors];
            saveExecutorsToLocal();
            renderExecutorSelect();
            closeModal();
        }
    }

    // ---------- ОБНОВЛЕНИЕ ИМЕНИ ФАЙЛА ----------
    function updateFileNameDisplay(file) {
        const span = document.getElementById('fileNameDisplay');
        if (file) {
            span.textContent = file.name.length > 28 ? file.name.substring(0, 25) + '...' : file.name;
        } else {
            span.textContent = 'Файл не выбран';
        }
    }

    // ---------- СОБЫТИЯ ----------
    function setupEventListeners() {
        const studyInput = document.getElementById('studyNameField');
        if (studyInput) studyInput.addEventListener('input', () => autoReplaceAbbreviations(studyInput));

        document.getElementById('exportBtn').addEventListener('click', exportToJson);
        document.getElementById('editExecutorsBtn').addEventListener('click', openExecutorModal);

        // стильный выбор файла
        const fileInput = document.getElementById('jsonImportFile');
        const customBtn = document.getElementById('customFileBtn');
        customBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                selectedFile = e.target.files[0];
                updateFileNameDisplay(selectedFile);
            } else {
                selectedFile = null;
                updateFileNameDisplay(null);
            }
        });

        const importBtn = document.getElementById('importJsonBtn');
        importBtn.addEventListener('click', () => {
            if (selectedFile) {
                importJsonFromFile(selectedFile);
            } else {
                alert('Сначала выберите JSON-файл');
            }
        });

        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModal = document.getElementById('cancelModalSaveBtn');
        const saveModal = document.getElementById('saveExecutorsModalBtn');
        const addModalBtn = document.getElementById('addExecutorModalBtn');
        const newExecutorInput = document.getElementById('newExecutorInput');

        closeModalBtn.addEventListener('click', closeModal);
        cancelModal.addEventListener('click', closeModal);
        saveModal.addEventListener('click', saveExecutorsFromModal);
        addModalBtn.addEventListener('click', () => {
            const name = newExecutorInput.value.trim();
            if (name === '') {
                alert('Введите ФИО исполнителя');
                return;
            }
            tempExecutors.push(name);
            newExecutorInput.value = '';
            renderModalExecutorList();
        });

        window.addEventListener('click', (e) => {
            const modal = document.getElementById('executorModal');
            if (e.target === modal) closeModal();
        });
    }

    function init() {
        loadExecutors();
        setDefaultDateTime();
        setupEventListeners();
        // очищаем display файла
        updateFileNameDisplay(null);
    }

    init();
</script>
</body>
</html>
