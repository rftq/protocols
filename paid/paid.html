<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PAID Research — Умный JSON конструктор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Segoe UI Variable', 'Roboto', sans-serif;
        }

        body {
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .app-dashboard {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 0.85fr 1.4fr;
            gap: 24px;
        }

        .card-pane {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid #eaeef2;
            padding: 24px 22px;
            transition: box-shadow 0.1s ease;
        }

        .card-pane:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        /* блок выбора файла */
        .file-select-area {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-select-btn {
            background: #f0f2f5;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            color: #1e1f22;
            transition: 0.1s;
        }
        .file-select-btn:hover {
            background: #e6e9ef;
            border-color: #0078d4;
        }
        .selected-file-name {
            font-size: 0.8rem;
            color: #4a5568;
            background: #f8f9fc;
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .compact-field {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 2px 10px;
            transition: all 0.2s;
        }
        .compact-field:focus-within {
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            background: white;
        }
        .field-icon {
            font-size: 1rem;
            color: #4a5568;
        }
        .compact-field input {
            border: none;
            background: transparent;
            padding: 6px 0;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
        .date-field {
            width: auto;
            min-width: 200px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            background: #f9fafc;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e9edf2;
            margin-top: 4px;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
            cursor: pointer;
            margin: 0;
            font-size: 0.9rem;
        }
        .radio-group input {
            width: auto;
            accent-color: #0078d4;
        }

        .executor-radios {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #f9fafc;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #e9edf2;
            margin-top: 4px;
        }
        .executor-radios label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .executor-radios input {
            width: auto;
            accent-color: #0078d4;
        }
        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .section-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button {
            background: #ffffff;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #cbd5e1;
            transition: 0.1s linear;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.9rem;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Зеленая кнопка отправки */
        .send-to-json-btn {
            margin-top: 20px;
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
        }
        .send-to-json-btn:hover {
            background: #059669;
        }

        .abbrev-section {
            margin-top: 20px;
            border-top: 1px solid #eef2f6;
            padding-top: 16px;
        }
        .abbrev-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .abbrev-list {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 12px;
            background: #fafcff;
            border-radius: 14px;
            padding: 4px;
        }
        .abbrev-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 30px;
            border: 1px solid #eef2f6;
            font-size: 0.8rem;
        }
        .abbrev-pair {
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 40px;
        }
        .abbrev-actions button {
            width: auto;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 6px;
            background: white;
        }
        .add-abbrev {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .add-abbrev input {
            flex: 1;
            min-width: 100px;
            padding: 6px 10px;
            font-size: 0.8rem;
            border-radius: 10px;
            border: 1px solid #d1d9e6;
        }
        .add-abbrev button {
            width: auto;
            padding: 6px 14px;
            background: #f0f2f5;
        }

        .viewer-header {
            margin-bottom: 20px;
        }
        .filter-section {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .filter-date {
            flex: 0.33;
            min-width: 100px;
            position: relative;
        }
        .filter-search {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .filter-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 4px;
        }
        .filter-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .filter-wrapper input {
            width: 100%;
            padding: 8px 32px 8px 12px;
            border-radius: 10px;
            border: 1px solid #d1d9e6;
            font-size: 0.85rem;
            background: white;
        }
        .clear-filter {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
        .clear-filter:hover {
            color: #475569;
            background: #f1f5f9;
        }

        .json-viewer {
            max-height: 70vh;
            min-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }
        
        /* Компактные карточки в одну строку */
        .data-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 10px 16px;
            border: 1px solid #e9edf2;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
        }
        .data-card:hover {
            border-color: #cbdde9;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .card-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .card-icon {
            font-size: 0.95rem;
        }
        .card-text {
            color: #1a202c;
            font-weight: 500;
        }
        .placeholder {
            text-align: center;
            color: #7f8c8d;
            padding: 48px 20px;
            background: #fafcff;
            border-radius: 24px;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            padding: 24px;
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.12);
        }
        .executor-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            margin-bottom: 10px;
            padding: 8px 14px;
            border-radius: 40px;
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .app-dashboard { grid-template-columns: 1fr; gap: 20px; }
            .filter-date { flex: 1; }
            .data-card { flex-direction: column; align-items: flex-start; white-space: normal; }
            .card-item { white-space: normal; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #eef2f8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-dashboard">
    <div class="card-pane">
        <div class="file-select-area">
            <button class="file-select-btn" id="selectFileBtnLeft">📁 Выбрать файл</button>
            <span id="selectedFileNameLeft" class="selected-file-name">Файл не выбран</span>
        </div>

        <div class="form-group">
            <div class="compact-field date-field" style="display: inline-flex; width: auto;">
                <span class="field-icon">📅</span>
                <input type="datetime-local" id="dateTimeField" style="width: auto; min-width: 190px;">
            </div>
        </div>

        <div class="form-group">
            <div class="compact-field">
                <span class="field-icon">👤</span>
                <input type="text" id="fullNameField" placeholder="Иванов Иван Иванович">
            </div>
        </div>

        <div class="form-group">
            <div class="radio-group">
                <label><input type="radio" name="modality" value="РГ" checked> 📦 РГ</label>
                <label><input type="radio" name="modality" value="ФЛГ"> 🫁 ФЛГ</label>
                <label><input type="radio" name="modality" value="КТ"> 🖥️ КТ</label>
                <label><input type="radio" name="modality" value="МРТ"> 🧠 МРТ</label>
            </div>
        </div>

        <div class="form-group">
            <div class="section-label">📝 Название исследования (автозамена из списка)</div>
            <div class="compact-field" style="margin-top: 6px;">
                <input type="text" id="studyNameField" placeholder="Например: кт грудной клетки" style="width: 100%;">
            </div>
        </div>

        <div class="form-group">
            <div class="flex-between">
                <div class="section-label">👨‍💻 Исполнитель</div>
                <button type="button" id="editExecutorsBtn" style="background:none; border:none; color:#0078d4; text-decoration:underline; padding:0; font-size:0.75rem;">✏️ Редактировать список</button>
            </div>
            <div id="executorRadiosContainer" class="executor-radios"></div>
        </div>

        <button id="sendToJsonBtn" class="send-to-json-btn">📨 Отправить в JSON</button>

        <div class="abbrev-section">
            <div class="abbrev-title">
                <span>🔤 Сокращения → полная фраза</span>
            </div>
            <div id="abbrevListContainer" class="abbrev-list"></div>
            <div class="add-abbrev">
                <input type="text" id="newAbbr" placeholder="сокращение (кт)">
                <input type="text" id="newFull" placeholder="полная фраза">
                <button id="addAbbrevBtn">➕ Добавить</button>
            </div>
            <div style="font-size: 0.7rem; color:#6c757d; margin-top: 8px;">Автозамена работает в реальном времени (наберите сокращение и пробел)</div>
        </div>
    </div>

    <div class="card-pane">
        <div class="viewer-header">
            <div class="filter-section">
                <div class="filter-search">
                    <label>🔍 Поиск</label>
                    <div class="filter-wrapper">
                        <input type="text" id="searchInput" placeholder="Поиск по ФИО, исследованию, исполнителю...">
                        <button class="clear-filter" id="clearSearchBtn" title="Очистить">✖</button>
                    </div>
                </div>
                <div class="filter-date">
                    <label>📅 Фильтр по дате</label>
                    <div class="filter-wrapper">
                        <input type="date" id="dateFilterInput">
                        <button class="clear-filter" id="clearDateFilter" title="Очистить">✖</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="jsonViewerContainer" class="json-viewer">
            <div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>
        </div>
    </div>
</div>

<div id="executorModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn" style="float:right; font-size:24px; cursor:pointer;">&times;</span>
        <h3 style="margin-bottom:20px;">📇 Редактор исполнителей</h3>
        <div id="executorListModal"></div>
        <div style="display:flex; gap:12px; margin:20px 0;">
            <input type="text" id="newExecutorInput" placeholder="ФИО исполнителя" style="flex:1; padding:8px; border-radius:10px; border:1px solid #d1d9e6;">
            <button id="addExecutorModalBtn">➕ Добавить</button>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px;">
            <button id="saveExecutorsModalBtn" class="primary-btn">💾 Сохранить</button>
            <button id="cancelModalSaveBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    let executorsList = [];
    let abbreviations = [];
    let currentLoadedJson = null;
    let selectedFile = null;
    let selectedExecutor = '';

    const STORAGE_EXECUTORS = 'paid_executors';
    const STORAGE_ABBREV = 'paid_abbreviations';

    const DEFAULT_ABBREV = [
        { abbr: "рг", full: "Рентгенография" },
        { abbr: "флг", full: "Флюорография" },
        { abbr: "кт", full: "Компьютерная томография" },
        { abbr: "мрт", full: "Магнитно-резонансная томография" }
    ];

    function loadExecutors() {
        const stored = localStorage.getItem(STORAGE_EXECUTORS);
        if (stored) {
            try {
                executorsList = JSON.parse(stored);
                if (!Array.isArray(executorsList) || executorsList.length === 0) throw new Error();
            } catch(e) {
                executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
            }
        } else {
            executorsList = ['Иванов И.И.', 'Петрова А.В.', 'Сидоров С.С.'];
        }
        renderExecutorRadios();
    }

    function saveExecutorsToLocal() {
        localStorage.setItem(STORAGE_EXECUTORS, JSON.stringify(executorsList));
    }

    function renderExecutorRadios() {
        const container = document.getElementById('executorRadiosContainer');
        if (!container) return;
        container.innerHTML = '';
        if (executorsList.length === 0) {
            container.innerHTML = '<div style="padding:8px; color:#999;">Нет исполнителей. Добавьте через редактор.</div>';
            return;
        }
        executorsList.forEach((exec, idx) => {
            const isChecked = (selectedExecutor === exec) || (idx === 0 && !selectedExecutor);
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'executorRadio';
            radio.value = exec;
            if (isChecked) {
                radio.checked = true;
                selectedExecutor = exec;
            }
            radio.addEventListener('change', (e) => {
                if (e.target.checked) selectedExecutor = e.target.value;
            });
            label.appendChild(radio);
            label.appendChild(document.createTextNode(exec));
            container.appendChild(label);
        });
    }

    function loadAbbreviations() {
        const stored = localStorage.getItem(STORAGE_ABBREV);
        if (stored) {
            try {
                abbreviations = JSON.parse(stored);
                if (!Array.isArray(abbreviations)) throw new Error();
            } catch(e) {
                abbreviations = [...DEFAULT_ABBREV];
            }
        } else {
            abbreviations = [...DEFAULT_ABBREV];
        }
        renderAbbrevList();
    }

    function saveAbbreviationsToLocal() {
        localStorage.setItem(STORAGE_ABBREV, JSON.stringify(abbreviations));
    }

    function renderAbbrevList() {
        const container = document.getElementById('abbrevListContainer');
        if (!container) return;
        container.innerHTML = '';
        if (abbreviations.length === 0) {
            container.innerHTML = '<div style="padding: 12px; text-align:center; color:#aaa;">Нет сокращений</div>';
            return;
        }
        abbreviations.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'abbrev-item';
            div.innerHTML = `
                <div><span class="abbrev-pair">${escapeHtml(item.abbr)} → ${escapeHtml(item.full)}</span></div>
                <div class="abbrev-actions">
                    <button class="edit-abbrev" data-idx="${idx}">✏️</button>
                    <button class="del-abbrev" data-idx="${idx}">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });

        document.querySelectorAll('.edit-abbrev').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                const newAbbr = prompt('Сокращение (например, кт):', abbreviations[idx].abbr);
                if (newAbbr && newAbbr.trim()) {
                    const newFull = prompt('Полная фраза:', abbreviations[idx].full);
                    if (newFull && newFull.trim()) {
                        abbreviations[idx] = { abbr: newAbbr.trim().toLowerCase(), full: newFull.trim() };
                        saveAbbreviationsToLocal();
                        renderAbbrevList();
                    }
                }
            });
        });
        document.querySelectorAll('.del-abbrev').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                abbreviations.splice(idx, 1);
                saveAbbreviationsToLocal();
                renderAbbrevList();
            });
        });
    }

    function autoReplaceAbbreviations(inputElement) {
        let value = inputElement.value;
        let changed = false;
        
        for (let rule of abbreviations) {
            const abbr = rule.abbr;
            const full = rule.full;
            if (!abbr || !full) continue;
            
            const regex = new RegExp(`\\b${escapeRegex(abbr)}\\b`, 'gi');
            let match;
            while ((match = regex.exec(value)) !== null) {
                changed = true;
                value = value.substring(0, match.index) + full + value.substring(match.index + match[0].length);
                regex.lastIndex = match.index + full.length;
            }
        }
        
        if (changed) {
            const cursorPos = inputElement.selectionStart;
            inputElement.value = value;
            if (cursorPos) {
                const newPos = Math.min(cursorPos + (value.length - inputElement.value.length), value.length);
                inputElement.setSelectionRange(newPos, newPos);
            }
        }
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    let replaceTimeout;
    function handleStudyInput(e) {
        clearTimeout(replaceTimeout);
        replaceTimeout = setTimeout(() => {
            autoReplaceAbbreviations(e.target);
        }, 10);
    }

    function setDefaultDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('dateTimeField').value = `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function getFormData() {
        const dateRaw = document.getElementById('dateTimeField').value;
        if (!dateRaw) throw new Error('Укажите дату');
        const fullName = document.getElementById('fullNameField').value.trim();
        if (!fullName) throw new Error('Введите ФИО');
        let modality = '';
        const radios = document.getElementsByName('modality');
        for (let r of radios) if (r.checked) { modality = r.value; break; }
        const studyNameRaw = document.getElementById('studyNameField').value.trim();
        let executor = selectedExecutor;
        if (!executor && executorsList.length > 0) executor = executorsList[0];
        if (!executor) throw new Error('Нет доступных исполнителей');
        const studyName = studyNameRaw || 'Не указано';
        return { dateRaw, fullName, modality, studyName, executor };
    }

    function formatDateTimeForFile(dateTimeStr) {
        let dateObj = new Date(dateTimeStr);
        if (isNaN(dateObj.getTime())) dateObj = new Date();
        const day = dateObj.getDate();
        const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
        const monthAbbr = months[dateObj.getMonth()];
        const hours = String(dateObj.getHours()).padStart(2, '0');
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        const seconds = String(new Date().getSeconds()).padStart(2, '0');
        return `${day}${monthAbbr}_${hours}-${minutes}-${seconds}`;
    }

    function formatDateTimeForDisplay(dateTimeStr) {
        if (!dateTimeStr) return '—';
        if (dateTimeStr.includes('T')) {
            const [datePart, timePart] = dateTimeStr.split('T');
            const [year, month, day] = datePart.split('-');
            return `${day}.${month}.${year} ${timePart}`;
        }
        return dateTimeStr;
    }

    function generateFileName(modality, dateTimeStr) {
        const prefixMap = { 'РГ':'rg', 'ФЛГ':'flg', 'КТ':'ct', 'МРТ':'mrt' };
        const prefix = prefixMap[modality] || 'rg';
        const dateTimeForFile = formatDateTimeForFile(dateTimeStr);
        return `PAID_${dateTimeForFile}.json`;
    }

    function sendToJson() {
        try {
            const formData = getFormData();
            const newRecord = {
                dateTime: formData.dateRaw,
                fullName: formData.fullName,
                modality: formData.modality,
                studyName: formData.studyName,
                executor: formData.executor,
                addedTimestamp: new Date().toISOString()
            };

            let baseData = currentLoadedJson;
            let updatedData;
            if (baseData === null) {
                updatedData = [newRecord];
            } else if (Array.isArray(baseData)) {
                updatedData = [...baseData, newRecord];
            } else if (typeof baseData === 'object') {
                updatedData = [baseData, newRecord];
            } else {
                updatedData = [newRecord];
            }

            // Обновляем currentLoadedJson новыми данными
            currentLoadedJson = updatedData;
            
            // Обновляем отображение в viewer
            filterAndRender();
            
            // Сохраняем файл
            const fileName = generateFileName(formData.modality, formData.dateRaw);
            const jsonStr = JSON.stringify(updatedData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } catch (err) {
            alert(err.message);
        }
    }

    function filterAndRender() {
        if (!currentLoadedJson) {
            document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>';
            return;
        }
        
        let items = [];
        if (Array.isArray(currentLoadedJson)) items = currentLoadedJson;
        else if (currentLoadedJson && typeof currentLoadedJson === 'object') items = [currentLoadedJson];
        else {
            document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">⚠️ Некорректный формат данных</div>';
            return;
        }

        const dateFilter = document.getElementById('dateFilterInput').value;
        const searchText = document.getElementById('searchInput').value.trim().toLowerCase();

        const filtered = items.filter(item => {
            if (dateFilter) {
                let itemDate = item.dateTime || '';
                let formattedDate = '';
                if (itemDate && itemDate.includes('T')) {
                    const [datePart] = itemDate.split('T');
                    formattedDate = datePart;
                } else {
                    formattedDate = itemDate.split(' ')[0];
                }
                if (formattedDate !== dateFilter) return false;
            }
            
            if (searchText) {
                const fullName = (item.fullName || '').toLowerCase();
                const studyName = (item.studyName || '').toLowerCase();
                const executor = (item.executor || '').toLowerCase();
                const modality = (item.modality || '').toLowerCase();
                if (!fullName.includes(searchText) && !studyName.includes(searchText) && 
                    !executor.includes(searchText) && !modality.includes(searchText)) {
                    return false;
                }
            }
            return true;
        });

        renderJsonCards(filtered);
    }

    function getModalityEmoji(modality) {
        if (modality === 'РГ') return '📦';
        if (modality === 'ФЛГ') return '🫁';
        if (modality === 'КТ') return '🖥️';
        if (modality === 'МРТ') return '🧠';
        return '📡';
    }

    function renderJsonCards(data) {
        const container = document.getElementById('jsonViewerContainer');
        container.innerHTML = '';
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="placeholder">📭 Нет данных для отображения</div>';
            return;
        }
        
        for (let record of data) {
            const card = document.createElement('div');
            card.className = 'data-card';
            
            const displayDate = formatDateTimeForDisplay(record.dateTime);
            const modalityEmoji = getModalityEmoji(record.modality);
            const fullName = record.fullName || '—';
            const studyName = record.studyName || 'Не указано';
            const executor = record.executor || '—';
            const modality = record.modality || '—';
            
            card.innerHTML = `
                <div class="card-item"><span class="card-icon">📅</span><span class="card-text">${escapeHtml(displayDate)}</span></div>
                <div class="card-item"><span class="card-icon">👤</span><span class="card-text">${escapeHtml(fullName)}</span></div>
                <div class="card-item"><span class="card-icon">${modalityEmoji}</span><span class="card-text">${escapeHtml(modality)}</span></div>
                <div class="card-item"><span class="card-icon">📝</span><span class="card-text">${escapeHtml(studyName)}</span></div>
                <div class="card-item"><span class="card-icon">👨‍💻</span><span class="card-text">${escapeHtml(executor)}</span></div>
            `;
            container.appendChild(card);
        }
    }

    function loadAndDisplayJson(file) {
        if (!file) return;
        selectedFile = file;
        updateFileNameDisplay(file);
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                currentLoadedJson = parsed;
                filterAndRender();
            } catch (err) {
                alert('Ошибка парсинга JSON: ' + err.message);
                document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">❌ Неверный формат JSON</div>';
                currentLoadedJson = null;
            }
        };
        reader.onerror = () => alert('Не удалось прочитать файл');
        reader.readAsText(file, 'UTF-8');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateFileNameDisplay(file) {
        const leftSpan = document.getElementById('selectedFileNameLeft');
        if (file) leftSpan.textContent = file.name.length > 35 ? file.name.substring(0, 32) + '...' : file.name;
        else leftSpan.textContent = 'Файл не выбран';
    }

    let tempExecutors = [];
    function openExecutorModal() {
        tempExecutors = [...executorsList];
        renderModalExecutorList();
        document.getElementById('executorModal').style.display = 'flex';
    }
    function renderModalExecutorList() {
        const container = document.getElementById('executorListModal');
        if (!container) return;
        container.innerHTML = '';
        if (tempExecutors.length === 0) {
            container.innerHTML = '<div class="executor-item"><span>Нет исполнителей</span></div>';
        } else {
            tempExecutors.forEach((exec, idx) => {
                const div = document.createElement('div');
                div.className = 'executor-item';
                div.innerHTML = `<span>${escapeHtml(exec)}</span>
                    <div><button class="edit-exec-modal" data-idx="${idx}">✏️</button>
                    <button class="del-exec-modal" data-idx="${idx}">🗑️</button></div>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.edit-exec-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    const newName = prompt('Новое ФИО:', tempExecutors[idx]);
                    if (newName && newName.trim()) { tempExecutors[idx] = newName.trim(); renderModalExecutorList(); }
                });
            });
            document.querySelectorAll('.del-exec-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    tempExecutors.splice(idx, 1);
                    renderModalExecutorList();
                });
            });
        }
    }
    function closeModal() { document.getElementById('executorModal').style.display = 'none'; }
    function saveExecutorsFromModal() {
        if (tempExecutors.length === 0) {
            if (confirm('Список исполнителей пуст. Продолжить?')) { executorsList = []; saveExecutorsToLocal(); renderExecutorRadios(); closeModal(); }
        } else { executorsList = [...tempExecutors]; saveExecutorsToLocal(); renderExecutorRadios(); closeModal(); }
        if (executorsList.length > 0 && !selectedExecutor) selectedExecutor = executorsList[0];
    }

    function setupEventListeners() {
        const studyInput = document.getElementById('studyNameField');
        if (studyInput) {
            studyInput.addEventListener('input', handleStudyInput);
            studyInput.addEventListener('blur', () => autoReplaceAbbreviations(studyInput));
        }

        document.getElementById('sendToJsonBtn').addEventListener('click', sendToJson);
        document.getElementById('editExecutorsBtn').addEventListener('click', openExecutorModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelModalSaveBtn').addEventListener('click', closeModal);
        document.getElementById('saveExecutorsModalBtn').addEventListener('click', saveExecutorsFromModal);
        document.getElementById('addExecutorModalBtn').addEventListener('click', () => {
            const name = document.getElementById('newExecutorInput').value.trim();
            if (name) { tempExecutors.push(name); document.getElementById('newExecutorInput').value = ''; renderModalExecutorList(); }
            else alert('Введите ФИО');
        });

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.id = 'jsonImportFileGlobal';
        fileInput.accept = '.json';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        
        const selectFileBtn = document.getElementById('selectFileBtnLeft');
        selectFileBtn.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                loadAndDisplayJson(e.target.files[0]);
            } else {
                selectedFile = null;
                currentLoadedJson = null;
                updateFileNameDisplay(null);
                document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>';
            }
        });

        const dateFilter = document.getElementById('dateFilterInput');
        const searchInput = document.getElementById('searchInput');
        const clearDateBtn = document.getElementById('clearDateFilter');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        
        dateFilter.addEventListener('input', filterAndRender);
        searchInput.addEventListener('input', filterAndRender);
        clearDateBtn.addEventListener('click', () => { dateFilter.value = ''; filterAndRender(); });
        clearSearchBtn.addEventListener('click', () => { searchInput.value = ''; filterAndRender(); });

        document.getElementById('addAbbrevBtn').addEventListener('click', () => {
            const abbr = document.getElementById('newAbbr').value.trim().toLowerCase();
            const full = document.getElementById('newFull').value.trim();
            if (!abbr || !full) { alert('Введите и сокращение, и полную фразу'); return; }
            if (abbreviations.some(a => a.abbr === abbr)) { alert('Такое сокращение уже есть'); return; }
            abbreviations.push({ abbr, full });
            saveAbbreviationsToLocal();
            renderAbbrevList();
            document.getElementById('newAbbr').value = '';
            document.getElementById('newFull').value = '';
        });

        window.addEventListener('click', (e) => {
            const modal = document.getElementById('executorModal');
            if (e.target === modal) closeModal();
        });
    }

    function init() {
        loadExecutors();
        loadAbbreviations();
        setDefaultDateTime();
        setupEventListeners();
        currentLoadedJson = null;
        selectedFile = null;
        updateFileNameDisplay(null);
        document.getElementById('jsonViewerContainer').innerHTML = '<div class="placeholder">✨ Выберите JSON-файл, чтобы увидеть карточки</div>';
    }
    init();
</script>
</body>
</html>
